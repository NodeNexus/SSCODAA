<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Products — SSCO | Smart Shopping Cart Optimizer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div id="navbar"></div>

<div class="page">
  <div style="margin-bottom:1.25rem">
    <h1 class="section-title">🛍️ Products</h1>
    <p id="result-info" class="section-sub">Loading with Merge Sort...</p>
    <div style="font-size:0.68rem;color:var(--text-3);margin-top:6px;font-family:monospace;opacity:0.8;display:flex;align-items:center;gap:4px">
      <span>🔹</span>
      <span>Source: Real-time Flipkart Scraper + Simulated Multi-platform Pricing (DAA Algorithm Demo)</span>
    </div>
  </div>

  <!-- Algo info banner -->
  <div id="algo-banner" class="card" style="padding:.85rem 1.25rem;margin-bottom:1.25rem;display:none">
    <div style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:center">
      <div class="algo-tag algo-dc">📊 Divide &amp; Conquer</div>
      <span id="algo-info" style="color:var(--text-2);font-size:.84rem"></span>
    </div>
  </div>

  <div class="sidebar-layout">
    <!-- ── Sidebar ── -->
    <aside class="card sidebar" style="padding:1.25rem;gap:.75rem;display:flex;flex-direction:column">
      <!-- Search -->
      <div>
        <label class="filter-label">Search</label>
        <input id="searchInput" class="input" type="text" placeholder="Search products..."
               onkeydown="if(event.key==='Enter'){applySearch()}"/>
        <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:.5rem" onclick="applySearch()">Search</button>
      </div>

      <!-- Sort -->
      <div>
        <label class="filter-label">Sort By (Merge Sort)</label>
        <select id="sortSelect" class="input" style="cursor:pointer" onchange="applyFilters()">
          <option value="relevance">⭐ Relevance</option>
          <option value="price_asc">💰 Price: Low → High</option>
          <option value="price_desc">💰 Price: High → Low</option>
          <option value="rating">⭐ Rating</option>
          <option value="reviews">📣 Most Reviewed</option>
          <option value="best_price">🏆 Best Deal</option>
        </select>
      </div>

      <!-- Platform -->
      <div>
        <label class="filter-label">Platform (for price sort)</label>
        <div id="platFilters"></div>
      </div>

      <!-- Category -->
      <div>
        <label class="filter-label">Category</label>
        <div id="catFilters">
          <button class="filter-btn active" onclick="filterCat('')" id="cat-all">All</button>
        </div>
      </div>
    </aside>

    <!-- ── Product Grid ── -->
    <main>
      <div id="error-banner" class="card" style="padding:1rem 1.25rem;background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25);color:#fca5a5;margin-bottom:1rem;display:none;font-size:.85rem">
        ⚠️ Backend not running. Start it: <code>python backend/server.py</code>
      </div>

      <div id="product-grid" class="grid-3">
        <!-- Skeleton cards -->
        ${[...Array(8)].map(()=>`
          <div class="card">
            <div class="skeleton" style="height:170px;border-radius:16px 16px 0 0"></div>
            <div style="padding:1rem;display:flex;flex-direction:column;gap:.65rem">
              <div class="skeleton" style="height:11px;width:30%"></div>
              <div class="skeleton" style="height:17px;width:85%"></div>
              <div class="skeleton" style="height:13px;width:55%"></div>
              <div class="skeleton" style="height:26px;width:50%"></div>
              <div style="display:flex;gap:.4rem">
                <div class="skeleton" style="height:20px;width:65px;border-radius:100px"></div>
                <div class="skeleton" style="height:20px;width:65px;border-radius:100px"></div>
              </div>
              <div class="skeleton" style="height:38px;border-radius:11px"></div>
            </div>
          </div>`).join('')}
      </div>
    </main>
  </div>
</div>

<footer><p>🛒 Smart Shopping Cart Optimizer — DAA Project</p></footer>

<script src="/js/state.js?v=2"></script>
<script>
  renderNavbar('products');

  const PLATFORMS = ['amazon','flipkart','meesho','snapdeal','myntra'];
  let currentPlatform = 'amazon';
  let currentCat = '';

  // Read URL params
  const params = new URLSearchParams(window.location.search);
  const initSearch   = params.get('search')   || '';
  const initCategory = params.get('category') || '';
  const initSort     = params.get('sort')     || 'relevance';

  // Init inputs
  document.getElementById('searchInput').value = initSearch;
  document.getElementById('sortSelect').value  = initSort;
  currentCat = initCategory;

  // Render platform filter buttons
  document.getElementById('platFilters').innerHTML = PLATFORMS.map(p => `
    <button class="filter-btn ${p === currentPlatform ? 'active' : ''}"
            id="plat-${p}" onclick="filterPlat('${p}')">
      ${PLAT[p]?.label || p}
    </button>`).join('');

  // Load & render categories
  fetch('/api/categories')
    .then(r => r.json())
    .then(d => {
      const wrap = document.getElementById('catFilters');
      wrap.innerHTML = `<button class="filter-btn ${!currentCat?'active':''}" onclick="filterCat('')" id="cat-all">All</button>`;
      (d.categories || []).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `filter-btn ${cat === currentCat ? 'active' : ''}`;
        btn.textContent = cat;
        btn.onclick = () => filterCat(cat);
        wrap.appendChild(btn);
      });
    });

  function applySearch() {
    const q = document.getElementById('searchInput').value.trim();
    loadProducts({ search: q });
  }

  function applyFilters() { loadProducts(); }

  function filterPlat(p) {
    currentPlatform = p;
    document.querySelectorAll('#platFilters .filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('plat-'+p)?.classList.add('active');
    loadProducts();
  }

  function filterCat(cat) {
    currentCat = cat;
    document.querySelectorAll('#catFilters .filter-btn').forEach(b => b.classList.remove('active'));
    const allBtn = document.getElementById('cat-all');
    if (!cat) { allBtn?.classList.add('active'); }
    else {
      document.querySelectorAll('#catFilters .filter-btn').forEach(b => {
        if (b.textContent === cat) b.classList.add('active');
      });
    }
    loadProducts();
  }

  async function loadProducts(overrides = {}) {
    const sort     = document.getElementById('sortSelect').value;
    const search   = document.getElementById('searchInput').value.trim();

    const qs = new URLSearchParams({
      sort:     sort,
      platform: currentPlatform,
      search:   search,
      category: currentCat,
      ...overrides
    });

    showSkeletons();

    try {
      const res  = await fetch('/api/products?' + qs);
      const data = await res.json();

      // Update algo banner
      if (data.algorithm) {
        const b = document.getElementById('algo-banner');
        const i = document.getElementById('algo-info');
        i.innerHTML = `<strong style="color:#a5b4fc">Merge Sort</strong> — ${data.algorithm.total_comparisons} comparisons · Time: <code style="color:#6ee7b7">${data.algorithm.complexity}</code>`;
        b.style.display = 'flex';
      }

      // Update result info
      document.getElementById('result-info').textContent =
        `${data.count} products — sorted using Merge Sort O(n log n)`;

      renderGrid(data.products || []);
    } catch(e) {
      document.getElementById('error-banner').style.display = 'block';
      document.getElementById('product-grid').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-3)">Could not load products. Is the Python server running?</div>';
    }
  }

  function showSkeletons() {
    document.getElementById('product-grid').innerHTML = Array(6).fill(`
      <div class="card">
        <div class="skeleton" style="height:170px;border-radius:16px 16px 0 0"></div>
        <div style="padding:1rem;display:flex;flex-direction:column;gap:.65rem">
          <div class="skeleton" style="height:11px;width:35%"></div>
          <div class="skeleton" style="height:17px;width:80%"></div>
          <div class="skeleton" style="height:26px;width:45%"></div>
          <div class="skeleton" style="height:38px;border-radius:11px"></div>
        </div>
      </div>`).join('');
  }

  function renderGrid(products) {
    if (products.length === 0) {
      document.getElementById('product-grid').innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--text-3)">
          <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
          <div style="font-size:1.05rem;color:var(--text-2)">No products found</div>
          <button class="chip" style="margin-top:1rem" onclick="filterCat('');document.getElementById('searchInput').value='';loadProducts()">
            Clear Filters
          </button>
        </div>`;
      return;
    }

    // Cache products
    products.forEach(p => { _productCache[p.id] = p; });

    document.getElementById('product-grid').innerHTML = products
      .map((p, i) => `<div>${productCardHTML(p, currentPlatform)}</div>`)
      .join('');
  }

  loadProducts();
</script>
</body>
</html>
